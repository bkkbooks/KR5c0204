front:
  text: 天心正法脩眞道場設醮儀則二
  hash: sha256:ce7617ea99b977c4e68cac6b2dddc2a5839c2ee5b96cece483a4b522c14c3ce8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0204_HFL_000-001a, image: hfl/0566/0566-030.png}
body:
  text: 法事如式都講舉各禮師存念如法髙功宣五方衞靈呪東方九炁青天明星大神煥照東郷洞映九門轉燭陽光掃穢除氛開明童子備衛我軒收魔縛祅上對帝君奉神正道赤書玉文九天符命攝龍驛傳普天安鎭臣得飛仙南方南方丹天三炁流光熒星轉燭洞照太陽上有赤精開明靈童總禦火兵備守三宫斬邪束祅剪截魔王北帝所承風火八衝流鈴交煥敢有不從正道流行我享上功保天長存億劫無終西方七炁之天太白流精光耀金門洞照太冥中有素皇號曰帝靈保神安鎭衞我身形斷截邪源玉道正明宫殿整肅三景齊并道合自然飛昇紫庭靈寳符命普惠萬生功加一切天地咸寜北方北方玄天五炁徘徊辰星煥爛光耀太微黒靈尊神飛仙羽衣備守五門檢精捕非敢有干試豁落斬摧玉符所告神振八威邪門閉塞正道明開映照臣身三光同輝䇿空駕浮舉形仙飛中央黄中理炁總統元眞鎭星吐暉流煥九天開明童子一十二人元炁陽精炎上朱烟洞照天下及臣等身百邪摧落攝鬼萬千中山神呪普天使然五靈安鎭身飛上仙次都講舉唱鳴法鼓二十四通次髙功法師發鑪無上三天玄元始三炁太上老君召出臣等身中三五功曹左右官使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官各三十六人岀出者嚴裝關啓此間土地里域正神臣今正爾燒香奉爲某人於某處爲某事開建某齋若干晝夜罷散曰修設清醮一座若干分位意者普告十方關盟三界祈恩謝過請福禳災保族安家延年益算願得太上十方正眞生炁逄流入臣等身中令臣所啓速達逕御至眞無極大道昊天玉皇上帝御前次髙功法師云衆官各長跪次髙功法師出受經籙治職謹出臣身中五體眞官功曹吏岀上三天執法開化隂陽功曹度道消災散禍解厄君吏各十二人出臣所受法籙治中建節監功大將軍前部効功後部効殺驛庭令驛庭丞四部監功謁者上仙上靈直使功曹左右官使者隂陽神決吏各二人出出者嚴裝顯服冠帶垂纓整其威儀弁朱陽之幘冠通天之冠衣皂紈單衣腰帶籠頭之劒操持謁簿使者弁玄隂之㥽冠九德之冠衣絳章單衣腰帶虎符齊執玉版直使功曹住立四方正一功曹住立中央治病功曹營衞臣身左官使者建節在前右官使者持幢在後陽神决吏立左隂神決吏立右上部功曹住立上方中部功曹住立身中促氣功曹催促十方上部使者逺望上天中部使者逺瞻八方都官使者帀繞臣身郎吏虎賁察奸鈎騎都官僕射天丁力士治正執正吏收神食神吏收鬼食鬼吏收炁食炁吏收毒食毒吏收精食精吏收邪食邪吏誅符破廟吏剛風騎置吏驛馬上章吏飛龍騎吏等並屯住臣左右前後受臣詞語分别關啓此間土地里域眞官正神監察考召左右都平君天師所布下二十八治三十六靖廬七十二福地三百六十名山崑崙上宫洞天海嶽三元四始二十四炁十二司神太歳太隂甲子諸官君眞元正炁三萬六千神在時受命章中從事東夷南蠻西戎北狄中央三泰五老神君山川溪谷靈官將吏同誠上啓虛無自然元始天尊無極大道太上道君太上老君上德皇帝太上開天執符御曆含眞體道昊天至尊玉皇上帝聖祖上靈髙道九天司命保生天尊大帝紫微天皇大帝紫微北極大帝承天効法厚德光大后土皇地祇元天大聖后三十二天帝東華南極西靈北眞仙都玉京金闕七寳瓊臺紫微上宫靈寳至眞明皇道君三皇五帝十一曜星君南辰北斗尊星天地水三官二十八宿星君玄中大法師三天大法師天樞院相公北極驅邪院衆聖靈寳三師四聖眞君天曹四司五嶽帝君齋主法師䢖生星斗君本命元辰眞官歳德尊神一切眞仙三界官屬臣以宿命因縁叨行法教告盟之日約以行持祗奉道眞欽崇法㑹俟監觀於至懇垂濟度之殊恩伏願昭鍚靈休誕膺聖眷脱塵寰之濡滯傀道炁以充盈施利濟於無窮屏祅邪於不測唯期聖造俯納䖍祈臣某誠惶誠恐頓首激切之至謹啓以聞次都講舉唱各稱法位道衆默稱受經籙治職具髙功法師受經籙法位臣某等謹同誠上啓虚無自然元始天尊無極大道太上道君太上老君混元上德皇帝太上開天執符御曆含眞體道昊天玉皇上帝聖祖上靈髙道九天司命保生天尊大帝紫微天皇大帝紫微北極大帝承天効法厚德光大后土皇地祇元天大聖后曰月星宿天地四司斗中帝座三府三官天樞院北極驅邪院聖衆太上妙籙北帝法籙中眞仙五嶽四瀆洞天福地三界神仙十方衆聖臣聞生天生地肇興象帝之先無眹無聲混合希夷之上含靈所主大道攸宗宏敷濟物之慈髙著祈恩之法太上弟子某䖍傾精意俯爲微軀眞斾靈旛肅設瑶壇之禮飈輪歘駕願回金闕之遊旣懷惕愓之心以俟穰穰之福仰瞻紫宙欽佇景輿願賜降臨俯歆蠲潔臣與太上弟子等無任祈求激切之至稽首再拜奉請次道士執神號請聖次上香上茶上酒次知磬奏初獻法事旋繞次知磬詠步虚詞稽首禮太上燒香歸虚無流明隨我回法輪亦三周玄願四大興靈慶及王侯七祖生天堂煌煌耀景敷嘯歌觀太漠天樂適我娛齊馨無上德下仙不與儔妙相朗元覺詵詵巡虚遊次都講舉唱各稱名位道衆黙稱所受經籙治職具髙功法師受經籙法位臣某與太上弟子某等同誠上啓三清上聖四帝髙眞金闕帝君清都上宰圎穹星宿厚地神仙三界威靈十方衆聖臣聞戴天履地荷大道之生成食德飲和繄衆神之造化凡處幅員之内盡霑亭毒之恩佌佌無知冥冥何報太上弟子某傳度云宿依道䕃獲覩文條願親清淨之門誓授元眞之職仰荷眷懷之造益増尊奉之心是以特於某處爲某事謹依科式廣啓薰修䢖立壇場恭祈眞位庶流貺施永保燕安伏願上聖回光靈仙垂鑒暫迂飈馭俯察精𠂻載惟懇禱之誠寔整歸依之素太上弟子詞文謹當宣奏次宣詞引正一法師上太上弟子詞文巳申啓奏恭承聽覧少賜矜容特垂至大之恩允集無窮之福臣聞三清杳𨗿萬聖尊崇非視聽之可求豈名言之能述今太上弟子祗奉上穹歸投大道法眞詮之密語體玄教以修身尚慮宿愆自貽隂譴今則特依科式大啓醮筵迓三境之髙眞延九天之列聖恭陳蠲潔希降仙靈伏願道心純一世累消融保茲幻化之身得遂修眞之教然後長生久視行滿功成恩普及於存亡福永綏於師保臣與太上弟子等無任激切之至謹稽首再拜次上香獻酒次知磬奏亞獻法事次知磬舉大學仙讃學仙絶華念念念相因積去來亂我神神躁靡不歷滅念停虚閑蕭蕭入空寂請經若飢渴持忘如金石保子飛仙路五靈度符籍臣謹重誠上啓北辰帝座日月皇君五星四曜尊星北斗南辰大聖三官主宰五帝眞君一十八宿星辰天樞院衆聖玄中大法師三天大法師靈寳經籍度三師北極驅邪院衆聖闔座眞靈周天列象伏以清都上宰翼張玄化之功紫府大神佐佑無私之德乗時岀震體物施仁恭拜首以陳情兾垂慈而降鑒切念太上弟子臣早依眞教忝稱治官志在修持心存利濟推行科法叅佩靈符仰遵上帝之仁普救下民之苦是以肅陳瑶席延降雲車所望恩休廣霑動植代願道心堅正法力興隆保眞氣於一身消罪𠎝於宿劫功加師保恩被生靈仰期炤鑒之功式恊祈求之望臣與太上弟子等無任激切之至謹稽首再拜次三上香獻酒獻湯次知磬舉三獻法事次知磬舉出堂頌道以齋爲先勤行登金闕故設大法橋普度諸人物宿世恩德報道心超然發身飛升仙都七祖咸解脫臣謹重誠上啓五嶽帝主四海龍神名山洞天靖廬福地十洲三島四瀆百川治職仙官昇眞大聖天司官屬地府天神仙曹將吏法籙靈官幽冥主執水陸正神三界威靈十方至聖伏以維天作屏巍乎四望之尊因地成形巋若五方之鎭共承帝眷分董人寰恭致慤以陳情兾垂慈而作證太上弟子傳度云夙欽道妙誓佩眞符欲成濟物之功須藉修眞之術是以廣陳蠲潔式薦馨香特啓壇場恭修醮禮伏願天心助順神理親人祅邪咸殄於九幽威德普加於萬𩔖然後民臣安泰共欣戴於堯天道法興隆助綿長於周曆臣與太上弟子無任激切之至謹稽首再拜宣傳度科式獻錢馬則於此宣奏次遍啓臣謹重誠上啓三清上帝十極眞仙海嶽神靈天地仙衆三界官屬一切威靈今巳禮周三獻詞不再陳延佇眞靈稽停儀衛惟憂浼瀆伏積兢惶伏願上界眞靈各還瑶闕下方列聖盡復仙曹傾光旣盻於醮筵降福必從於吉夕臣與太上弟子等無任攀戀禱祝望恩之至謹稽首再拜奉送次知磬舉送神頌迴軿五雲輿騰駕九章歌倐歘冲天逺醮筵香炁多玄恩覃宇宙福禄遍山河緬想神仙路逍遥上大羅次髙功法師復官臣奏醮事訖向來所出功曹使者並還臣身從衆妙門而入在左還左在右還右直使功曹主領撿押還復本位無令差互後召即到一如故事次髙功法師復鑪香官使者左右龍虎君侍香諸靈官當令設醮之所自然生金液丹碧芝英百靈衆眞交㑹在此香火鑪前伏願太上弟子受福臣等蒙恩十方仙童玉女侍衞香烟傳奏向來所啓之誠速達徑御至眞無極大道昊天玉皇上帝御前次知磬舉詠華夏讃次引至焚詞所序立次引上香度詞奠酒拜退次知磬舉詠回向讃上來設醮功德伏願太上弟子某及臣等同頼善功成無上道一切信禮次髙功法師回向念善云奉爲太上弟子某人祈恩謝過集福消災念大聖元始天尊無極大道靈寳天尊太上老君紫清降福天尊延夀益算天尊長生保命天尊八卦護身天尊九宫捍厄天尊十方靈寳天尊日蓋大慈眞人月靜大悲眞人南昌延夀眞人三清玉藏眞人玉京山中一切仙聖不可思議功德次知磬舉醮事畢弟子退位天心正法修眞道場設醮儀
